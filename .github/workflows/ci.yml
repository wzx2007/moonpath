name: MoonBit CI

on:
  push:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install MoonBit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"
      - name: Update registry
        run: moon update
      - name: Format check
        run: moon fmt --check
      - name: Build
        run: moon build
      - name: Test
        run: moon test
